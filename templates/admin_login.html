<!DOCTYPE html>
<html>
<head>
    <title>Admin Login</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:
                radial-gradient(circle at 20% 20%, rgba(13,110,253,.25), transparent 30%),
                linear-gradient(135deg,#0b1020,#111827 60%,#1e1b4b);
            font-family:Arial,sans-serif;
        }

        .login-card{
            width:370px;
            background:#111827;
            border:1px solid rgba(255,255,255,.10);
            border-radius:22px;
            padding:32px;
            box-shadow:0 25px 60px rgba(0,0,0,.35);
        }

        .logo-box{
            width:58px;
            height:58px;
            border-radius:16px;
            display:flex;
            align-items:center;
            justify-content:center;
            background:linear-gradient(135deg,#0d6efd,#8b5cf6);
            color:white;
            font-size:26px;
            margin:auto;
        }

        h3{
            color:white;
            font-weight:700;
        }

        p{
            color:#98a2b3;
            font-size:14px;
        }

        label{
            color:#d0d5dd;
            font-size:14px;
            margin-bottom:7px;
        }

        .form-control{
            height:46px;
            border-radius:12px;
            background:#1f2937;
            border:1px solid #344054;
            color:white;
        }

        .form-control:focus{
            background:#1f2937;
            color:white;
            border-color:#0d6efd;
            box-shadow:none;
        }

        .form-control::placeholder{
            color:#667085;
        }

        .btn-login{
            height:46px;
            border-radius:12px;
            border:none;
            font-weight:600;
            background:linear-gradient(135deg,#0d6efd,#8b5cf6);
        }

        .home-link{
            color:#98a2b3;
            text-decoration:none;
            font-size:14px;
        }

        .home-link:hover{
            color:white;
        }
    </style>
</head>

<body>

<div class="login-card">

    <div class="text-center mb-4">
        <div class="logo-box mb-3">
            <i class="bi bi-shield-lock-fill"></i>
        </div>

        <h3>Admin Access</h3>
        <p>Secure dashboard login</p>
    </div>

    {% if error %}
    <div class="alert alert-danger text-center py-2">
        {{ error }}
    </div>
    {% endif %}

    <form method="POST">
        <div class="mb-3">
            <label>Username</label>
            <input type="text" name="username" class="form-control" placeholder="admin" required>
        </div>

        <div class="mb-4">
            <label>Password</label>
            <input type="password" name="password" class="form-control" placeholder="Enter password" required>
        </div>

        <button class="btn btn-primary btn-login w-100">
            Login
        </button>
    </form>

    <div class="text-center mt-4">
        <a href="/" class="home-link">
            <i class="bi bi-arrow-left"></i> Back to website
        </a>
    </div>

</div>

</body>
</html>
