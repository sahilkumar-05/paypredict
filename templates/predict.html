<!DOCTYPE html>
<html>
<head>
    <title>Predict Salary</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background: #f5f7fb;
            font-family: Arial, sans-serif;
            opacity: 0;
            animation: pageFadeIn .7s ease forwards;
        }

        @keyframes pageFadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .custom-navbar {
            background: rgba(10, 15, 30, 0.92);
            backdrop-filter: blur(18px);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            box-shadow: 0 10px 35px rgba(0,0,0,0.25);
        }

        .brand-logo {
            width: 42px;
            height: 42px;
            background: linear-gradient(135deg, #0d6efd, #8b5cf6);
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: white;
            margin-right: 10px;
            transition: transform .35s ease;
        }

        .navbar-brand:hover .brand-logo {
            transform: rotate(-8deg) scale(1.08);
        }

        .nav-menu {
            background: rgba(255,255,255,0.08);
            padding: 7px;
            border-radius: 40px;
        }

        .nav-menu a {
            color: #d0d5dd;
            text-decoration: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-weight: 500;
            display: inline-block;
            transition: all .3s ease;
        }

        .nav-menu a:hover,
        .nav-menu a.active {
            background: linear-gradient(135deg, #0d6efd, #8b5cf6);
            color: white;
        }

        .navbar-toggler-custom {
            display: none;
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.15);
            color: white;
            font-size: 1.35rem;
            width: 46px;
            height: 46px;
            border-radius: 12px;
            align-items: center;
            justify-content: center;
            transition: all .25s ease;
        }

        .navbar-toggler-custom:hover {
            background: linear-gradient(135deg, #0d6efd, #8b5cf6);
        }

        .page-hero {
            padding: 140px 0 60px;
            background:
                radial-gradient(circle at 15% 20%, rgba(13,110,253,0.35), transparent 32%),
                radial-gradient(circle at 90% 25%, rgba(139,92,246,0.35), transparent 28%),
                linear-gradient(135deg, #0b1020, #111827 55%, #1e1b4b);
            background-size: 160% 160%;
            animation: heroDrift 14s ease-in-out infinite;
            color: white;
        }

        @keyframes heroDrift {
            0%   { background-position: 0% 0%; }
            50%  { background-position: 60% 30%; }
            100% { background-position: 0% 0%; }
        }

        .page-hero h1 {
            opacity: 0;
            animation: riseIn .7s ease .1s forwards;
        }

        .page-hero p {
            opacity: 0;
            animation: riseIn .7s ease .25s forwards;
        }

        @keyframes riseIn {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .predict-card {
            margin-top: -35px;
            border: none;
            border-radius: 26px;
            box-shadow: 0 18px 50px rgba(16,24,40,0.12);
            opacity: 0;
            animation: riseIn .7s ease .35s forwards;
        }

        .form-control,
        .form-select {
            padding: 13px;
            border-radius: 14px;
            transition: box-shadow .25s ease, border-color .25s ease, transform .2s ease;
        }

        .form-control:focus,
        .form-select:focus {
            box-shadow: 0 0 0 4px rgba(13,110,253,0.15);
            border-color: #0d6efd;
            transform: translateY(-1px);
        }

        .btn-vip {
            background: linear-gradient(135deg, #0d6efd, #8b5cf6);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 16px;
            font-weight: 600;
            transition: transform .25s ease, box-shadow .25s ease;
            box-shadow: 0 12px 28px rgba(13,110,253,0.28);
        }

        .btn-vip:hover {
            transform: translateY(-3px);
            box-shadow: 0 18px 36px rgba(13,110,253,0.42);
            color: white;
        }

        .btn-vip:active {
            transform: translateY(0);
        }

        .result-box {
            background: linear-gradient(135deg, #0d6efd, #8b5cf6);
            color: white;
            border-radius: 22px;
            padding: 25px;
            text-align: center;
            opacity: 0;
            animation: resultPop .55s cubic-bezier(.34,1.56,.64,1) forwards;
        }

        @keyframes resultPop {
            from { opacity: 0; transform: scale(0.9) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        footer {
            background: #101828;
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.001ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.001ms !important;
            }
        }

        @media (max-width: 991px) {
            .navbar-toggler-custom {
                display: flex;
            }

            .nav-menu {
                display: none;
                position: absolute;
                top: 68px;
                left: 12px;
                right: 12px;
                width: auto;
                flex-direction: column;
                border-radius: 20px;
                padding: 12px;
                background: rgba(10,15,30,0.97);
                z-index: 999;
            }

            .nav-menu.show {
                display: flex;
                animation: slideDownMenu .3s ease;
            }

            .nav-menu a {
                text-align: center;
                margin: 4px 0;
            }
        }

        @keyframes slideDownMenu {
            from { opacity: 0; transform: translateY(-12px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark fixed-top custom-navbar py-3">
    <div class="container d-flex align-items-center justify-content-between">
        <a class="navbar-brand fw-bold d-flex align-items-center" href="/">
            <span class="brand-logo">
                <i class="bi bi-cpu-fill"></i>
            </span>
            Salary<span class="text-primary">AI</span>
        </a>

        <button class="navbar-toggler-custom" onclick="toggleMobileNav()" aria-label="Toggle navigation">
            <i class="bi bi-list" id="navToggleIcon"></i>
        </button>

        <div class="nav-menu" id="navMenu">
            <a href="/"><i class="bi bi-house-door"></i> Home</a>
            <a href="/predict" class="active"><i class="bi bi-graph-up-arrow"></i> Predict</a>
            <a href="/about"><i class="bi bi-info-circle"></i> About</a>
            
        </div>
    </div>
</nav>

<section class="page-hero text-center">
    <div class="container">
        <h1 class="display-5 fw-bold">Predict Employee Salary</h1>
        <p class="lead text-white-50">
            Enter employee details and get an AI-based annual salary estimate.
        </p>
    </div>
</section>

<div class="container pb-5">
    <div class="card predict-card p-4 mx-auto" style="max-width: 850px;">
        <form method="POST">
            <div class="row g-3">

                <div class="col-md-6">
                    <label class="form-label">Job Title</label>
                    <select name="job_title" class="form-select" required>
                        {% for job in job_titles %}
                        <option value="{{ job }}">{{ job }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Experience Years</label>
                    <input type="number" name="experience_years" class="form-control" min="0" max="30" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Education Level</label>
                    <select name="education_level" class="form-select" required>
                        {% for edu in education_levels %}
                        <option value="{{ edu }}">{{ edu }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Skills Count</label>
                    <input type="number" name="skills_count" class="form-control" min="1" max="20" required>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Company Size</label>
                    <select name="company_size" class="form-select" required>
                        {% for company in company_sizes %}
                        <option value="{{ company }}">{{ company }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label">Location</label>
                    <select name="location" class="form-select" required>
                        {% for location in locations %}
                        <option value="{{ location }}">{{ location }}</option>
                        {% endfor %}
                    </select>
                </div>

            </div>

            <button type="submit" class="btn btn-vip w-100 mt-4">
                <i class="bi bi-lightning-charge-fill"></i> Predict Salary
            </button>
        </form>

        {% if prediction %}
        <div class="result-box mt-4">
            <h5>Predicted Annual Salary</h5>
            <h1>${{ prediction }}</h1>
            <p class="mb-0">per year</p>
        </div>
        {% endif %}
    </div>
</div>

<footer class="text-white text-center py-4">
    <p class="mb-0">Employee Salary Prediction System using Flask and Machine Learning</p>
</footer>

<script>
    function toggleMobileNav() {
        var menu = document.getElementById('navMenu');
        var icon = document.getElementById('navToggleIcon');
        var isShown = menu.classList.toggle('show');
        icon.classList.toggle('bi-list', !isShown);
        icon.classList.toggle('bi-x-lg', isShown);
    }

    document.querySelectorAll('#navMenu a').forEach(function (link) {
        link.addEventListener('click', function () {
            document.getElementById('navMenu').classList.remove('show');
            var icon = document.getElementById('navToggleIcon');
            icon.classList.remove('bi-x-lg');
            icon.classList.add('bi-list');
        });
    });

    window.addEventListener('resize', function () {
        if (window.innerWidth > 991) {
            document.getElementById('navMenu').classList.remove('show');
            var icon = document.getElementById('navToggleIcon');
            icon.classList.remove('bi-x-lg');
            icon.classList.add('bi-list');
        }
    });
</script>

</body>
</html>
